<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Toán & Lưu Giữ Tết Nguyên Đán</title>
    <!-- Tailwind CSS để dựng giao diện nhanh, đẹp, mobile-first -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.5s, color 0.5s; }
        /* Các bộ theme màu sắc thay đổi động theo con giáp */
        .theme-ty, .theme-mao, .theme-ngo, .theme-dau { background-color: #fef2f2; --main-color: #dc2626; } /* Tông Đỏ hồng */
        .theme-suu, .theme-thin, .theme-mui, .theme-tuat { background-color: #fefcbf; --main-color: #d69e2e; } /* Tông Vàng đất */
        .theme-dan, .theme-ty-2, .theme-than, .theme-hoi { background-color: #f0fdf4; --main-color: #16a34a; } /* Tông Xanh lá */
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col items-center p-4">

    <!-- KHU VỰC CHƯA ĐĂNG NHẬP -->
    <div id="login-card" class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center my-auto">
        <div class="text-red-500 text-6xl mb-4"><i class="fa-solid fa-calendar-heart"></i></div>
        <h1 class="text-2xl font-bold mb-2">Tết Nguyên Đán Mốc Thời Gian</h1>
        <p class="text-gray-500 mb-6 text-sm">Vui lòng đăng nhập email để xem, tính toán và lưu trữ danh sách các năm Tết của riêng bạn.</p>
        <button id="btn-login" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 flex items-center justify-center gap-2 shadow-lg">
            <i class="fa-brands fa-google"></i> Đăng nhập với Google
        </button>
    </div>

    <!-- KHU VỰC ĐÃ ĐĂNG NHẬP -->
    <div id="main-content" class="hidden w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden my-4">
        <!-- Header người dùng -->
        <div class="bg-gradient-to-r from-red-600 to-orange-500 p-4 text-white flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="user-avatar" class="w-10 h-10 rounded-full border-2 border-white" src="" alt="Avatar">
                <div>
                    <p class="font-semibold text-sm leading-tight" id="user-name">Xin chào!</p>
                    <p class="text-xs text-red-100" id="user-email">email@gmail.com</p>
                </div>
            </div>
            <button id="btn-logout" class="bg-black/20 hover:bg-black/30 text-white text-xs px-3 py-2 rounded-lg transition">
                <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
            </button>
        </div>

        <!-- Nội dung chính -->
        <div class="p-6 space-y-6">
            <!-- Form Thêm Năm Mới -->
            <div>
                <h2 class="text-lg font-bold mb-3 text-gray-700 flex items-center gap-2">
                    <i class="fa-solid fa-plus-circle text-red-500"></i> Thêm Năm Cần Theo Dõi
                </h2>
                <div class="flex gap-2">
                    <input type="number" id="input-year" placeholder="Nhập năm (Ví dụ: 2027)" min="1900" max="2100" 
                           class="flex-1 px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 font-semibold text-center text-lg">
                    <button id="btn-add-year" class="bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-2 rounded-xl transition flex items-center gap-2">
                        <i class="fa-solid fa-calculator"></i> Tính & Lưu
                    </button>
                </div>
            </div>

            <!-- Khu vực Hiển thị Chi Tiết Năm Đang Chọn & Đổi Theme -->
            <div id="theme-display-box" class="p-6 rounded-xl border border-gray-100 shadow-sm text-center hidden transition-all duration-300">
                <span class="text-xs uppercase font-bold tracking-widest text-gray-400">Đang xem năm</span>
                <h3 id="txt-selected-year" class="text-4xl font-extrabold my-1 text-red-600">2026</h3>
                <p id="txt-selected-lunar" class="text-xl font-bold text-gray-700 mb-2">Bính Ngọ</p>
                <div class="inline-block bg-white/80 backdrop-blur-sm px-4 py-2 rounded-full text-sm font-medium shadow-sm border text-gray-600">
                    <i class="fa-regular fa-calendar-days text-red-500 mr-1"></i> Ngày Dương lịch: <span id="txt-solar-date" class="font-bold">17/02/2026</span>
                </div>
            </div>

            <!-- Danh sách các năm đã lưu -->
            <div>
                <h2 class="text-lg font-bold mb-3 text-gray-700 flex items-center gap-2">
                    <i class="fa-solid fa-list-ul text-red-500"></i> Danh Sách Năm Đã Lưu Của Bạn
                </h2>
                <div id="years-list" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                    <!-- Các thẻ năm sẽ render động vào đây -->
                </div>
            </div>
        </div>
    </div>

    <!-- TẢI CÁC THƯ VIỆN FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyCR_2mrPthGL8gOzkbjThM5mlI7fKEG7Vg",
            authDomain: "sound-19c50.firebaseapp.com",
            databaseURL: "https://sound-19c50-default-rtdb.firebaseio.com",
            projectId: "sound-19c50",
            storageBucket: "sound-19c50.firebasestorage.app",
            messagingSenderId: "150852760500",
            appId: "1:150852760500:web:e1fec708fb58de8b7bf8e1"
        };

        // Khởi tạo Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // Biến toàn cục lưu thông tin user
        let currentUser = null;

        // --- THUẬT TOÁN TÍNH TẾT NGUYÊN ĐÁN ĐƠN GIẢN HOẶC TRA CỨU MẪU ---
        // Do thuật toán Âm Lịch rất phức tạp, đây là hàm tra cứu / tính toán xấp xỉ cho các năm phổ biến
        function getLunarNewYearInfo(year) {
            const data = {
                2020: { date: "25/01/2020", stemBranch: "Canh Tý", slug: "ty" },
                2021: { date: "12/02/2021", stemBranch: "Tân Sửu", slug: "suu" },
                2022: { date: "01/02/2022", stemBranch: "Nhâm Dần", slug: "dan" },
                2023: { date: "22/01/2023", stemBranch: "Quý Mão", slug: "mao" },
                2024: { date: "10/02/2024", stemBranch: "Giáp Thìn", slug: "thin" },
                2025: { date: "29/01/2025", stemBranch: "Ất Tỵ", slug: "ty-2" },
                2026: { date: "17/02/2026", stemBranch: "Bính Ngọ", slug: "ngo" },
                2027: { date: "06/02/2027", stemBranch: "Đinh Mùi", slug: "mui" },
                2028: { date: "26/01/2028", stemBranch: "Mậu Thân", slug: "than" },
                2029: { date: "13/02/2029", stemBranch: "Kỷ Dậu", slug: "dau" },
                2030: { date: "03/02/2030", stemBranch: "Canh Tuất", slug: "tuat" },
                2031: { date: "23/01/2031", stemBranch: "Tân Hợi", slug: "hoi" }
            };

            if (data[year]) return data[year];

            // Hàm tính toán Can Chi cơ bản nếu năm nằm ngoài danh sách cứng
            const stems = ["Canh", "Tân", "Nhâm", "Quý", "Giáp", "Ất", "Bính", "Đinh", "Mậu", "Kỷ"];
            const branches = ["Tý", "Sửu", "Dần", "Mão", "Thìn", "Tỵ", "Ngọ", "Mùi", "Thân", "Dậu", "Tuất", "Hợi"];
            const slugs = ["ty", "suu", "dan", "mao", "thin", "ty-2", "ngo", "mui", "than", "dau", "tuat", "hoi"];
            
            const stem = stems[year % 10];
            const branchIndex = (year - 4) % 12;
            const branch = branches[branchIndex >= 0 ? branchIndex : branchIndex + 12];
            const slug = slugs[branchIndex >= 0 ? branchIndex : branchIndex + 12];

            // Ngày Tết Nguyên Đán ước tính trung bình cho các năm chưa có dữ liệu chính xác
            return {
                date: `Tháng 01 hoặc 02 năm ${year}`, 
                stemBranch: `${stem} ${branch}`,
                slug: slug
            };
        }

        // --- QUẢN LÝ ĐĂNG NHẬP ---
        document.getElementById('btn-login').addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(error => console.error("Lỗi đăng nhập:", error));
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth).then(() => {
                location.reload();
            });
        });

        // Theo dõi trạng thái User đăng nhập
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                // Hiển thị UI chính, ẩn login
                document.getElementById('login-card').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                
                // Điền thông tin profile
                document.getElementById('user-avatar').src = user.photoURL || 'https://via.placeholder.com/150';
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-email').innerText = user.email;

                // Tải dữ liệu riêng của Email này từ Firebase
                loadUserSavedYears();
            } else {
                currentUser = null;
                document.getElementById('login-card').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        // --- XỬ LÝ DỮ LIỆU VỚI FIREBASE REALTIME DATABASE ---
        
        // Tạo một node an toàn bằng cách mã hóa dấu "." của email
        function getUserNode() {
            return currentUser.email.replace(/\./g, ',');
        }

        // Thêm năm mới
        document.getElementById('btn-add-year').addEventListener('click', () => {
            const yearInput = document.getElementById('input-year').value.trim();
            if (!yearInput || isNaN(yearInput)) {
                alert("Vui lòng nhập một năm hợp lệ!");
                return;
            }

            const year = parseInt(yearInput);
            const info = getLunarNewYearInfo(year);

            // Lưu trực tiếp vào Firebase dưới node riêng của User
            const userNode = getUserNode();
            set(ref(db, `users_tet_data/${userNode}/${year}`), {
                year: year,
                date: info.date,
                stemBranch: info.stemBranch,
                slug: info.slug,
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('input-year').value = '';
                changeThemeAndDisplay(info, year);
            });
        });

        // Tải danh sách đã lưu từ Database về hiển thị công khai trên giao diện
        function loadUserSavedYears() {
            const userNode = getUserNode();
            const userRef = ref(db, `users_tet_data/${userNode}`);
            
            onValue(userRef, (snapshot) => {
                const listContainer = document.getElementById('years-list');
                listContainer.innerHTML = ''; // Reset danh sách cũ
                
                const data = snapshot.val();
                if (!data) {
                    listContainer.innerHTML = `<p class="text-sm text-gray-400 col-span-full text-center py-4">Bạn chưa lưu năm nào. Hãy nhập ở trên!</p>`;
                    return;
                }

                // Sắp xếp các năm theo thứ tự tăng dần
                const sortedYears = Object.keys(data).sort((a, b) => b - a);

                sortedYears.forEach(year => {
                    const item = data[year];
                    
                    const btnCard = document.createElement('div');
                    btnCard.className = "bg-gray-50 hover:bg-red-50 border border-gray-200 rounded-xl p-3 flex flex-col justify-between items-center relative group cursor-pointer transition shadow-sm hover:scale-[1.02]";
                    
                    btnCard.innerHTML = `
                        <div class="text-center w-full pr-4" onclick="window.selectYear(${item.year})">
                            <span class="block text-lg font-bold text-gray-800">${item.year}</span>
                            <span class="block text-xs font-semibold text-gray-500">${item.stemBranch}</span>
                        </div>
                        <button onclick="window.deleteYear(event, ${item.year})" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 text-xs transition opacity-100 sm:opacity-0 group-hover:opacity-100">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    `;
                    listContainer.appendChild(btnCard);
                });
            });
        }

        // --- THAY ĐỔI GIAO DIỆN THEO NĂM (THEME) ---
        function changeThemeAndDisplay(info, year) {
            const box = document.getElementById('theme-display-box');
            box.classList.remove('hidden');

            // Cập nhật text hiển thị
            document.getElementById('txt-selected-year').innerText = year;
            document.getElementById('txt-selected-lunar').innerText = info.stemBranch;
            document.getElementById('txt-solar-date').innerText = info.date;

            // Xóa tất cả class giao diện cũ trên body
            document.body.className = "bg-gray-50 text-gray-800 min-h-screen flex flex-col items-center p-4";
            
            // Thêm class theme mới dựa vào con giáp (slug)
            document.body.classList.add(`theme-${info.slug}`);
            
            // Thay đổi màu sắc nút nhấn chính động bộ theo biến màu css cục bộ
            const mainColor = getComputedStyle(document.body).getPropertyValue('--main-color').trim();
            if (mainColor) {
                document.getElementById('txt-selected-year').style.color = mainColor;
            }
        }

        // Đưa các hàm tương tác ra cửa sổ window để gọi từ thuộc tính gán trong HTML dễ dàng
        window.selectYear = function(year) {
            const info = getLunarNewYearInfo(year);
            changeThemeAndDisplay(info, year);
        };

        window.deleteYear = function(event, year) {
            event.stopPropagation(); // Ngăn sự kiện bấm thẻ kích hoạt selectYear
            if (confirm(`Bạn muốn xóa năm ${year} khỏi danh sách lưu trữ?`)) {
                const userNode = getUserNode();
                remove(ref(db, `users_tet_data/${userNode}/${year}`));
            }
        };
    </script>
</body>
</html>
